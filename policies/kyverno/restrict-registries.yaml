# OSCAL-CONTROL: SA-12 (Supply Chain Protection), CM-7 (Least Functionality)
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: restrict-registries
  annotations:
    policies.kyverno.io/title: Restrict Image Registries
    policies.kyverno.io/category: Supply Chain Security
    policies.kyverno.io/description: >-
      Only allows container images from approved registries
      (ghcr.io, cgr.dev, docker.io). For IL5 deployments, restrict to
      Iron Bank (registry1.dso.mil) only.
    nist-800-53: SA-12, CM-7
spec:
  validationFailureAction: Enforce
  background: true
  rules:
    - name: validate-image-registry
      match:
        any:
          - resources:
              kinds:
                - Pod
              namespaceSelector:
                matchLabels:
                  app.kubernetes.io/part-of: project-sentinel
      exclude:
        any:
          - resources:
              selector:
                matchLabels:
                  acme.cert-manager.io/http01-solver: "true"
      validate:
        message: >-
          Container images must come from an approved registry
          (ghcr.io/*, cgr.dev/*, or docker.io/*). Image '{{request.object.spec.containers[].image}}'
          is not from an approved registry.
        pattern:
          spec:
            containers:
              - image: "ghcr.io/* | cgr.dev/* | docker.io/* | postgres:* | nginx:* | python:* | node:*"
            =(initContainers):
              - image: "ghcr.io/* | cgr.dev/* | docker.io/* | postgres:* | nginx:* | python:* | node:*"
