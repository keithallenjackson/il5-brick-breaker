# OSCAL-CONTROL: SC-6 (Resource Availability)
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: require-resource-limits
  annotations:
    policies.kyverno.io/title: Require Resource Limits
    policies.kyverno.io/category: Best Practices
    policies.kyverno.io/description: >-
      Ensures all containers have CPU and memory resource limits
      defined to prevent resource exhaustion and denial of service.
    nist-800-53: SC-6
spec:
  validationFailureAction: Enforce
  background: true
  rules:
    - name: require-limits
      match:
        any:
          - resources:
              kinds:
                - Pod
              namespaceSelector:
                matchLabels:
                  app.kubernetes.io/part-of: project-sentinel
      validate:
        message: >-
          All containers must have CPU and memory resource limits
          defined. Add resources.limits.cpu and resources.limits.memory
          to each container specification.
        pattern:
          spec:
            containers:
              - resources:
                  limits:
                    cpu: "?*"
                    memory: "?*"
                  requests:
                    cpu: "?*"
                    memory: "?*"
