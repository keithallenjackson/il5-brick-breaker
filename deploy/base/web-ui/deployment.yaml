apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-ui
  namespace: brick-breaker
  labels:
    app.kubernetes.io/name: web-ui
    app.kubernetes.io/part-of: project-sentinel
    app.kubernetes.io/managed-by: flux
    app.kubernetes.io/component: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: web-ui
  template:
    metadata:
      labels:
        app.kubernetes.io/name: web-ui
        app.kubernetes.io/part-of: project-sentinel
        app.kubernetes.io/managed-by: flux
        app.kubernetes.io/component: frontend
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: web-ui
          image: ghcr.io/keithallenjackson/il5-brick-breaker/web-ui:latest
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          ports:
            - containerPort: 8080
              protocol: TCP
              name: http
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 30
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: nginx-tmp
              mountPath: /var/lib/nginx/tmp
            - name: nginx-run
              mountPath: /run
      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: 10Mi
        - name: nginx-tmp
          emptyDir:
            sizeLimit: 50Mi
        - name: nginx-run
          emptyDir:
            sizeLimit: 5Mi
