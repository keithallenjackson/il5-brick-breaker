apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: brick-breaker
  namespace: brick-breaker
  labels:
    app.kubernetes.io/name: brick-breaker-ingress
    app.kubernetes.io/part-of: project-sentinel
    app.kubernetes.io/managed-by: flux
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "1m"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - brick-breaker.example.mil
      secretName: brick-breaker-tls
  rules:
    - host: brick-breaker.example.mil
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: agent-runtime
                port:
                  number: 8000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: web-ui
                port:
                  number: 8080
