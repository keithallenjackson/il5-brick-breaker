apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: brick-breaker
  labels:
    app.kubernetes.io/name: brick-breaker-ingress
    app.kubernetes.io/part-of: project-sentinel
    app.kubernetes.io/managed-by: flux
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "1m"
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - brickbreak.keithjackson.dev
      secretName: brickbreak-tls
  rules:
    - host: brickbreak.keithjackson.dev
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: agent-runtime
                port:
                  number: 8000
          - path: /healthz
            pathType: Exact
            backend:
              service:
                name: agent-runtime
                port:
                  number: 8000
          - path: /readyz
            pathType: Exact
            backend:
              service:
                name: agent-runtime
                port:
                  number: 8000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: web-ui
                port:
                  number: 8080
