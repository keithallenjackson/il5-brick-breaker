apiVersion: v1
kind: Service
metadata:
  name: postgresql
  namespace: brick-breaker
  labels:
    app.kubernetes.io/name: postgresql
    app.kubernetes.io/part-of: project-sentinel
    app.kubernetes.io/managed-by: flux
spec:
  type: ClusterIP
  clusterIP: None
  selector:
    app.kubernetes.io/name: postgresql
  ports:
    - port: 5432
      targetPort: postgresql
      protocol: TCP
      name: postgresql
