apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: brick-breaker
  namespace: flux-system
spec:
  interval: 1m
  url: https://github.com/keithallenjackson/il5-brick-breaker
  ref:
    branch: main
---
# Cluster-wide infrastructure (ingress-nginx, cert-manager, kyverno)
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: brick-breaker-infrastructure
  namespace: flux-system
spec:
  interval: 10m
  path: ./deploy/infrastructure
  prune: true
  sourceRef:
    kind: GitRepository
    name: brick-breaker
  wait: true
  timeout: 10m
---
# CRD-dependent resources (ClusterIssuers require cert-manager CRDs)
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: brick-breaker-post-install
  namespace: flux-system
spec:
  interval: 10m
  path: ./deploy/infrastructure/post-install
  prune: true
  sourceRef:
    kind: GitRepository
    name: brick-breaker
  dependsOn:
    - name: brick-breaker-infrastructure
  timeout: 5m
---
# Dev environment
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: brick-breaker-dev
  namespace: flux-system
spec:
  interval: 5m
  path: ./deploy/overlays/dev
  prune: true
  sourceRef:
    kind: GitRepository
    name: brick-breaker
  dependsOn:
    - name: brick-breaker-post-install
  healthChecks:
    - apiVersion: apps/v1
      kind: Deployment
      name: agent-runtime
      namespace: brick-breaker-dev
    - apiVersion: apps/v1
      kind: Deployment
      name: web-ui
      namespace: brick-breaker-dev
    - apiVersion: apps/v1
      kind: StatefulSet
      name: postgresql
      namespace: brick-breaker-dev
  timeout: 5m
---
# Production environment
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: brick-breaker-production
  namespace: flux-system
spec:
  interval: 5m
  path: ./deploy/overlays/production
  prune: true
  sourceRef:
    kind: GitRepository
    name: brick-breaker
  dependsOn:
    - name: brick-breaker-post-install
  healthChecks:
    - apiVersion: apps/v1
      kind: Deployment
      name: agent-runtime
      namespace: brick-breaker-prod
    - apiVersion: apps/v1
      kind: Deployment
      name: web-ui
      namespace: brick-breaker-prod
    - apiVersion: apps/v1
      kind: StatefulSet
      name: postgresql
      namespace: brick-breaker-prod
  timeout: 10m
