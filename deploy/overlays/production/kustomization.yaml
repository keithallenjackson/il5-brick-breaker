apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

patches:
  # Production: 3 replicas for API, 2 for UI
  - target:
      kind: Deployment
      name: agent-runtime
    patch: |
      - op: replace
        path: /spec/replicas
        value: 3
  - target:
      kind: Deployment
      name: web-ui
    patch: |
      - op: replace
        path: /spec/replicas
        value: 2
  # Higher resource limits for production
  - target:
      kind: Deployment
      name: agent-runtime
    patch: |
      - op: replace
        path: /spec/template/spec/containers/0/resources
        value:
          requests:
            cpu: 200m
            memory: 256Mi
          limits:
            cpu: "1"
            memory: 512Mi
  - target:
      kind: StatefulSet
      name: postgresql
    patch: |
      - op: replace
        path: /spec/template/spec/containers/0/resources
        value:
          requests:
            cpu: 250m
            memory: 512Mi
          limits:
            cpu: "1"
            memory: 1Gi
  - target:
      kind: StatefulSet
      name: postgresql
    patch: |
      - op: replace
        path: /spec/volumeClaimTemplates/0/spec/resources/requests/storage
        value: 20Gi
