apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

patches:
  # Scale down to single replica for dev
  - target:
      kind: Deployment
      name: agent-runtime
    patch: |
      - op: replace
        path: /spec/replicas
        value: 1
  - target:
      kind: Deployment
      name: web-ui
    patch: |
      - op: replace
        path: /spec/replicas
        value: 1
  # Reduce resource limits for dev
  - target:
      kind: Deployment
      name: agent-runtime
    patch: |
      - op: replace
        path: /spec/template/spec/containers/0/resources
        value:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 250m
            memory: 128Mi
  - target:
      kind: Deployment
      name: web-ui
    patch: |
      - op: replace
        path: /spec/template/spec/containers/0/resources
        value:
          requests:
            cpu: 25m
            memory: 32Mi
          limits:
            cpu: 100m
            memory: 64Mi
