apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: brick-breaker-dev

resources:
  - ../../base

images:
  - name: ghcr.io/keithallenjackson/il5-brick-breaker/agent-runtime
    newTag: 74a3ff959e41e1fcafbe783af998fa3b1e223972
  - name: ghcr.io/keithallenjackson/il5-brick-breaker/web-ui
    newTag: 74a3ff959e41e1fcafbe783af998fa3b1e223972

patches:
  # Scale down to single replica for dev
  - target:
      kind: Deployment
      name: agent-runtime
    patch: |
      - op: replace
        path: /spec/replicas
        value: 1
  - target:
      kind: Deployment
      name: web-ui
    patch: |
      - op: replace
        path: /spec/replicas
        value: 1
  # Reduce resource limits for dev
  - target:
      kind: Deployment
      name: agent-runtime
    patch: |
      - op: replace
        path: /spec/template/spec/containers/0/resources
        value:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 250m
            memory: 128Mi
  - target:
      kind: Deployment
      name: web-ui
    patch: |
      - op: replace
        path: /spec/template/spec/containers/0/resources
        value:
          requests:
            cpu: 25m
            memory: 32Mi
          limits:
            cpu: 100m
            memory: 64Mi
  # Dev hostname
  - target:
      kind: Ingress
      name: brick-breaker
    patch: |
      - op: replace
        path: /spec/tls/0/hosts/0
        value: dev.brickbreak.keithjackson.dev
      - op: replace
        path: /spec/tls/0/secretName
        value: dev-brickbreak-tls
      - op: replace
        path: /spec/rules/0/host
        value: dev.brickbreak.keithjackson.dev
      - op: replace
        path: /metadata/annotations/cert-manager.io~1cluster-issuer
        value: letsencrypt-staging
  # Dev CORS origins
  - target:
      kind: Deployment
      name: agent-runtime
    patch: |
      - op: replace
        path: /spec/template/spec/containers/0/env/1/value
        value: '["https://dev.brickbreak.keithjackson.dev"]'
