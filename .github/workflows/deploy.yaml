name: Deploy

on:
  workflow_run:
    workflows: ["Build and Publish"]
    types: [completed]
    branches: [main]

permissions:
  contents: write

env:
  REGISTRY: ghcr.io/${{ github.repository }}

jobs:
  deploy-dev:
    name: Deploy to Dev
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    environment: dev
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Get triggering commit SHA
        id: sha
        run: echo "sha=${{ github.event.workflow_run.head_sha }}" >> "$GITHUB_OUTPUT"

      - name: Update dev image tags
        run: |
          cd deploy/overlays/dev
          sed -i "s|newTag: .*|newTag: ${{ steps.sha.outputs.sha }}|g" kustomization.yaml

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add deploy/overlays/dev/kustomization.yaml
          git diff --staged --quiet && echo "No changes to commit" && exit 0
          git commit -m "deploy(dev): update images to ${{ steps.sha.outputs.sha }}"
          git push

  smoke-test-dev:
    name: Smoke Test Dev
    runs-on: ubuntu-latest
    needs: deploy-dev
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Wait for Flux reconciliation
        run: |
          echo "Waiting for deployment to stabilize..."
          MAX_ATTEMPTS=24
          ATTEMPT=0
          until curl -sf --max-time 5 https://dev.brickbreak.keithjackson.dev/healthz > /dev/null 2>&1; do
            ATTEMPT=$((ATTEMPT + 1))
            if [ "$ATTEMPT" -ge "$MAX_ATTEMPTS" ]; then
              echo "Timed out waiting for deployment (120s)"
              exit 1
            fi
            echo "  Attempt $ATTEMPT/$MAX_ATTEMPTS - not ready yet, waiting 5s..."
            sleep 5
          done
          echo "Deployment is live."

      - name: Run smoke tests
        run: |
          chmod +x tests/smoke/smoke-test.sh
          ./tests/smoke/smoke-test.sh https://dev.brickbreak.keithjackson.dev

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: smoke-test-dev
    environment: production
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull latest (includes dev deploy commit)
        run: git pull --rebase

      - name: Get triggering commit SHA
        id: sha
        run: echo "sha=${{ github.event.workflow_run.head_sha }}" >> "$GITHUB_OUTPUT"

      - name: Update production image tags
        run: |
          cd deploy/overlays/production
          sed -i "s|newTag: .*|newTag: ${{ steps.sha.outputs.sha }}|g" kustomization.yaml

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add deploy/overlays/production/kustomization.yaml
          git diff --staged --quiet && echo "No changes to commit" && exit 0
          git commit -m "deploy(prod): update images to ${{ steps.sha.outputs.sha }}"
          git push
