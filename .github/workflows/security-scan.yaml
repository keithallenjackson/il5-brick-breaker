name: Security Scanning

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  security-events: write

jobs:
  sast:
    name: SAST (Semgrep)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Semgrep
        uses: returntocorp/semgrep-action@v1
        with:
          config: >-
            p/python
            p/typescript
            p/owasp-top-ten
            p/security-audit

  sca-python:
    name: SCA Python (Grype)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Grype
        uses: anchore/scan-action/download-grype@v4
      - name: Scan Python dependencies
        run: |
          cd apps/agent-runtime
          grype dir:. --only-fixed --fail-on critical

  sca-typescript:
    name: SCA TypeScript (Grype)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install dependencies
        run: cd apps/web-ui && npm ci
      - name: Install Grype
        uses: anchore/scan-action/download-grype@v4
      - name: Scan Node.js dependencies
        run: |
          cd apps/web-ui
          grype sbom:package-lock.json --only-fixed --fail-on critical

  secret-scan:
    name: Secret Scanning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install detect-secrets
        run: pip install detect-secrets
      - name: Run detect-secrets scan
        run: |
          detect-secrets scan --all-files --exclude-files '\.git/.*' --exclude-files 'node_modules/.*' --exclude-files 'package-lock\.json' > .secrets-baseline.json
          if detect-secrets audit --report --json .secrets-baseline.json 2>/dev/null | python3 -c "import sys,json; d=json.load(sys.stdin); sys.exit(1 if any(r.get('is_secret') for results in d.get('results',{}).values() for r in results) else 0)"; then
            echo "No secrets detected."
          else
            echo "Potential secrets found! Review .secrets-baseline.json"
            detect-secrets audit --report .secrets-baseline.json
            exit 1
          fi
