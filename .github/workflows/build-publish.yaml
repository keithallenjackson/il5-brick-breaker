name: Build and Publish

on:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write
  id-token: write

env:
  REGISTRY: registry1.dso.mil/ironbank/brick-breaker

jobs:
  build-agent-runtime:
    name: Build Agent Runtime
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to registry
        if: ${{ secrets.REGISTRY_USERNAME != '' }}
        uses: docker/login-action@v3
        with:
          registry: registry1.dso.mil
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: apps/agent-runtime
          push: ${{ secrets.REGISTRY_USERNAME != '' }}
          load: ${{ secrets.REGISTRY_USERNAME == '' }}
          tags: |
            ${{ env.REGISTRY }}/agent-runtime:${{ github.sha }}
            ${{ env.REGISTRY }}/agent-runtime:latest

      - name: Scan with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/agent-runtime:${{ github.sha }}
          format: sarif
          output: trivy-agent-runtime.sarif
          severity: CRITICAL,HIGH

      - name: Install Cosign
        if: ${{ secrets.REGISTRY_USERNAME != '' }}
        uses: sigstore/cosign-installer@v3

      - name: Sign image
        if: ${{ secrets.REGISTRY_USERNAME != '' }}
        run: |
          cosign sign --yes ${{ env.REGISTRY }}/agent-runtime:${{ github.sha }}

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.REGISTRY }}/agent-runtime:${{ github.sha }}
          format: cyclonedx-json
          output-file: sbom-agent-runtime.json

  build-web-ui:
    name: Build Web UI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to registry
        if: ${{ secrets.REGISTRY_USERNAME != '' }}
        uses: docker/login-action@v3
        with:
          registry: registry1.dso.mil
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: apps/web-ui
          push: ${{ secrets.REGISTRY_USERNAME != '' }}
          load: ${{ secrets.REGISTRY_USERNAME == '' }}
          tags: |
            ${{ env.REGISTRY }}/web-ui:${{ github.sha }}
            ${{ env.REGISTRY }}/web-ui:latest

      - name: Scan with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/web-ui:${{ github.sha }}
          format: sarif
          output: trivy-web-ui.sarif
          severity: CRITICAL,HIGH

      - name: Install Cosign
        if: ${{ secrets.REGISTRY_USERNAME != '' }}
        uses: sigstore/cosign-installer@v3

      - name: Sign image
        if: ${{ secrets.REGISTRY_USERNAME != '' }}
        run: |
          cosign sign --yes ${{ env.REGISTRY }}/web-ui:${{ github.sha }}

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.REGISTRY }}/web-ui:${{ github.sha }}
          format: cyclonedx-json
          output-file: sbom-web-ui.json
